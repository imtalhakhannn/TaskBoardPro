<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskBoard Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#0a0f1e;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#334155}

/* Navbar */
.navbar{background:#111827;color:#e2e8f0;padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:20px}
.logo{font-size:19px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:10px;color:#e2e8f0}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#818cf8);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 2px 12px rgba(99,102,241,0.3)}
.nav-divider{width:1px;height:28px;background:rgba(255,255,255,0.08)}
.project-name{font-size:14px;font-weight:600;color:#94a3b8;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;cursor:default}
.project-name i{font-size:10px;color:#64748b}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-btn{background:none;border:none;cursor:pointer;position:relative;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:17px;transition:all .2s ease}
.nav-btn:hover{background:rgba(255,255,255,0.06);color:#e2e8f0}
.notif-badge{position:absolute;top:4px;right:4px;background:#ef4444;width:18px;height:18px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;border:2px solid #111827}
.user-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#818cf8);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer;color:#fff;transition:all .2s ease}
.user-avatar:hover{opacity:.85}

/* Stats Bar */
.stats-bar{background:#111827;border-bottom:1px solid rgba(255,255,255,0.06);padding:12px 28px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:#94a3b8;flex-wrap:wrap}
.stats-bar .stat-item{display:flex;align-items:center;gap:6px}
.stats-bar .stat-divider{color:#1e293b;margin:0 4px}
.stats-bar .stat-count{font-weight:700;color:#e2e8f0}

/* Filter Bar */
.filter-bar{background:#0f172a;padding:12px 28px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.04);flex-wrap:wrap}
.filter-bar-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#64748b;margin-right:4px}
.filter-btn{padding:5px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#94a3b8;font-family:'Inter',sans-serif;transition:all .2s ease}
.filter-btn:hover{border-color:rgba(99,102,241,0.3);color:#e2e8f0}
.filter-btn.active{background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.4);color:#818cf8}

/* Board */
.board-wrapper{flex:1;padding:28px;overflow-x:auto;background:#0f172a}
.board{display:flex;gap:24px;min-height:calc(100vh - 200px)}

/* Columns */
.column{background:#111827;border-radius:14px;min-width:310px;width:310px;flex-shrink:0;display:flex;flex-direction:column;max-height:calc(100vh - 200px);border:1px solid rgba(255,255,255,0.06);transition:all .2s ease}
.column-header{padding:16px 16px 12px;display:flex;align-items:center;justify-content:space-between}
.column-title-group{display:flex;align-items:center;gap:8px}
.column-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.column-title{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8}
.card-count{background:rgba(255,255,255,0.06);color:#64748b;border-radius:6px;min-width:24px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;padding:0 6px}
.column-menu-btn{background:none;border:none;cursor:pointer;color:#475569;font-size:14px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .2s ease}
.column-menu-btn:hover{background:rgba(255,255,255,0.06);color:#94a3b8}
.column-body{flex:1;padding:0 8px 8px;overflow-y:auto;min-height:60px;transition:all .2s ease;border-radius:0 0 14px 14px}
.column-body.drag-over{background:rgba(99,102,241,0.05);box-shadow:inset 0 0 0 2px rgba(99,102,241,0.3);border-radius:0 0 14px 14px}

/* Cards */
.card{background:#1a2236;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:grab;border:1px solid rgba(255,255,255,0.06);transition:all .2s ease}
.card:hover{box-shadow:0 4px 20px rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.2);transform:translateY(-2px)}
.card:active{cursor:grabbing}
.card.dragging{opacity:.4;transform:rotate(2deg);box-shadow:0 8px 24px rgba(99,102,241,0.2)}
.card-labels{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.label{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.2px}
.label-frontend{background:rgba(139,92,246,0.2);color:#a78bfa}
.label-backend{background:rgba(8,145,178,0.2);color:#22d3ee}
.label-bug{background:rgba(239,68,68,0.2);color:#f87171}
.label-feature{background:rgba(16,185,129,0.2);color:#34d399}
.card-title{font-weight:600;font-size:14px;margin-bottom:5px;color:#e2e8f0;line-height:1.4}
.card-desc{font-size:12px;color:#64748b;margin-bottom:12px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;justify-content:space-between}
.card-meta-left{display:flex;align-items:center;gap:8px}
.priority{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.priority-high{background:rgba(220,38,38,0.15);color:#f87171}
.priority-medium{background:rgba(245,158,11,0.15);color:#fbbf24}
.priority-low{background:rgba(22,163,74,0.15);color:#4ade80}
.due-date{font-size:11px;color:#64748b;display:flex;align-items:center;gap:4px}
.due-date i{font-size:10px}
.assignee{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;border:2px solid #1a2236;box-shadow:0 1px 3px rgba(0,0,0,.2)}

/* Done column card styles */
.done-card{opacity:0.6}
.done-card .card-title{text-decoration:line-through;color:#64748b}

/* Move select */
.move-select{width:100%;margin-top:10px;padding:6px 10px;background:#0f172a;border:1px solid rgba(255,255,255,0.06);border-radius:8px;font-size:12px;color:#64748b;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s ease;appearance:auto;-webkit-appearance:auto}
.move-select:hover{border-color:rgba(99,102,241,0.4);color:#e2e8f0}
.move-select:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.move-select option{background:#1a2236;color:#e2e8f0}

/* Add card */
.add-card-btn{background:none;border:none;padding:10px 16px;color:#475569;font-size:13px;font-weight:500;cursor:pointer;text-align:left;border-radius:10px;margin:4px 8px 8px;display:flex;align-items:center;gap:8px;font-family:'Inter',sans-serif;transition:all .2s ease}
.add-card-btn:hover{background:rgba(255,255,255,0.04);color:#94a3b8}
.add-card-btn i{font-size:12px}
.add-form{padding:8px;display:none}
.add-form.open{display:block}
.add-form input{width:100%;padding:10px 14px;border:2px solid #6366f1;border-radius:10px;font-size:13px;outline:none;margin-bottom:8px;font-family:'Inter',sans-serif;transition:all .2s ease;background:#0f172a;color:#e2e8f0}
.add-form input::placeholder{color:#475569}
.add-form input:focus{box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.add-form-actions{display:flex;gap:8px}
.btn-add{background:#6366f1;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s ease}
.btn-add:hover{background:#4f46e5;box-shadow:0 2px 12px rgba(99,102,241,0.3)}
.btn-cancel{background:none;border:none;padding:8px 12px;font-size:13px;cursor:pointer;color:#64748b;font-family:'Inter',sans-serif;transition:all .2s ease}
.btn-cancel:hover{color:#94a3b8}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:500;align-items:flex-start;justify-content:center;padding:60px 16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#111827;border-radius:16px;width:100%;max-width:680px;box-shadow:0 24px 64px rgba(0,0,0,.5);animation:modalIn .25s ease;border:1px solid rgba(255,255,255,0.06)}
@keyframes modalIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:28px 28px 0}
.modal-header h2{font-size:20px;font-weight:700;color:#e2e8f0;flex:1;line-height:1.4}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:#64748b;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:all .2s ease}
.modal-close:hover{background:rgba(255,255,255,0.06);color:#e2e8f0}
.modal-body{padding:24px 28px 28px}
.modal-section{margin-bottom:20px}
.modal-section label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;color:#64748b;margin-bottom:8px;letter-spacing:.6px}
.modal-section textarea{width:100%;padding:12px 14px;border:1px solid rgba(255,255,255,0.06);border-radius:10px;font-size:14px;resize:vertical;min-height:90px;font-family:'Inter',sans-serif;outline:none;transition:all .2s ease;color:#e2e8f0;line-height:1.6;background:#0f172a}
.modal-section textarea:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.modal-row{display:flex;gap:16px;flex-wrap:wrap}
.modal-row .modal-section{flex:1;min-width:140px}
.modal-section select,.modal-section input[type="date"]{width:100%;padding:10px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:10px;font-size:13px;outline:none;background:#0f172a;font-family:'Inter',sans-serif;transition:all .2s ease;color:#e2e8f0}
.modal-section select option{background:#1a2236;color:#e2e8f0}
.modal-section select:focus,.modal-section input[type="date"]:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.modal-labels{display:flex;gap:8px;flex-wrap:wrap}
.modal-label-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent;opacity:.35;transition:all .2s ease}
.modal-label-btn:hover{opacity:.6}
.modal-label-btn.active{opacity:1;border-color:rgba(255,255,255,.1);transform:scale(1.05)}
.modal-label-btn.label-frontend{background:rgba(139,92,246,0.3);color:#a78bfa}
.modal-label-btn.label-backend{background:rgba(8,145,178,0.3);color:#22d3ee}
.modal-label-btn.label-bug{background:rgba(239,68,68,0.3);color:#f87171}
.modal-label-btn.label-feature{background:rgba(16,185,129,0.3);color:#34d399}

/* Comments */
.comments-list{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.comment{display:flex;gap:12px}
.comment-avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.comment-body{flex:1;background:#0f172a;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.04)}
.comment-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.comment-author{font-weight:600;font-size:13px;color:#e2e8f0}
.comment-time{font-size:11px;color:#64748b}
.comment-text{font-size:13px;color:#94a3b8;line-height:1.6}
.comment-input{display:flex;gap:8px}
.comment-input input{flex:1;padding:10px 14px;border:1px solid rgba(255,255,255,0.06);border-radius:10px;font-size:13px;outline:none;font-family:'Inter',sans-serif;transition:all .2s ease;background:#0f172a;color:#e2e8f0}
.comment-input input::placeholder{color:#475569}
.comment-input input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.comment-input button{background:#6366f1;color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:all .2s ease;display:flex;align-items:center;gap:6px}
.comment-input button:hover{background:#4f46e5;box-shadow:0 2px 12px rgba(99,102,241,0.3)}
.comment-input button i{font-size:12px}

/* Drop placeholder */
.drop-placeholder{border:2px dashed rgba(99,102,241,0.4);border-radius:10px;height:4px;margin-bottom:8px;background:rgba(99,102,241,0.05);transition:height .2s ease}

/* Responsive */
@media(max-width:768px){
  .board{flex-direction:column}
  .column{min-width:100%;width:100%;max-height:none}
  .board-wrapper{padding:16px}
  .navbar{padding:0 16px;height:56px}
  .nav-left{gap:12px}
  .project-name{display:none}
  .nav-divider{display:none}
  .stats-bar{padding:10px 16px}
  .filter-bar{padding:10px 16px}
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-left">
    <div class="logo">
      <div class="logo-icon"><i class="fa-solid fa-table-columns"></i></div>
      TaskBoard Pro
    </div>
    <div class="nav-divider"></div>
    <div class="project-name">
      <i class="fa-solid fa-folder"></i>
      Project Alpha
    </div>
  </div>
  <div class="nav-right">
    <button class="nav-btn" title="Search">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>
    <button class="nav-btn" title="Notifications">
      <i class="fa-solid fa-bell"></i>
      <span class="notif-badge">3</span>
    </button>
    <div class="user-avatar" title="Talha Khan">TK</div>
  </div>
</nav>

<!-- Stats Bar -->
<div class="stats-bar" id="statsBar"></div>

<!-- Filter Bar -->
<div class="filter-bar">
  <span class="filter-bar-label"><i class="fa-solid fa-filter"></i> Filter</span>
  <button class="filter-btn active" data-filter="All" onclick="setFilter('All',this)">All</button>
  <button class="filter-btn" data-filter="Frontend" onclick="setFilter('Frontend',this)">Frontend</button>
  <button class="filter-btn" data-filter="Backend" onclick="setFilter('Backend',this)">Backend</button>
  <button class="filter-btn" data-filter="Bug" onclick="setFilter('Bug',this)">Bug</button>
  <button class="filter-btn" data-filter="Feature" onclick="setFilter('Feature',this)">Feature</button>
</div>

<!-- Board -->
<div class="board-wrapper">
  <div class="board" id="board"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <label><i class="fa-solid fa-align-left"></i> Description</label>
        <textarea id="modalDesc"></textarea>
      </div>
      <div class="modal-row">
        <div class="modal-section">
          <label><i class="fa-solid fa-flag"></i> Priority</label>
          <select id="modalPriority">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="modal-section">
          <label><i class="fa-solid fa-user"></i> Assignee</label>
          <select id="modalAssignee">
            <option value="TK">Talha Khan</option>
            <option value="AS">Aisha Syed</option>
            <option value="MR">Mike Ross</option>
            <option value="JD">Jane Doe</option>
          </select>
        </div>
        <div class="modal-section">
          <label><i class="fa-regular fa-calendar"></i> Due Date</label>
          <input type="date" id="modalDue">
        </div>
      </div>
      <div class="modal-section">
        <label><i class="fa-solid fa-tags"></i> Labels</label>
        <div class="modal-labels" id="modalLabels">
          <span class="modal-label-btn label-frontend" data-label="Frontend" onclick="toggleModalLabel(this)">Frontend</span>
          <span class="modal-label-btn label-backend" data-label="Backend" onclick="toggleModalLabel(this)">Backend</span>
          <span class="modal-label-btn label-bug" data-label="Bug" onclick="toggleModalLabel(this)">Bug</span>
          <span class="modal-label-btn label-feature" data-label="Feature" onclick="toggleModalLabel(this)">Feature</span>
        </div>
      </div>
      <div class="modal-section">
        <label><i class="fa-regular fa-comments"></i> Comments</label>
        <div class="comments-list" id="modalComments"></div>
        <div class="comment-input">
          <input type="text" id="commentInput" placeholder="Write a comment..." onkeydown="if(event.key==='Enter')addComment()">
          <button onclick="addComment()"><i class="fa-solid fa-paper-plane"></i> Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

function avatarColor(initials) {
  var h = 0;
  for (var i = 0; i < initials.length; i++) {
    h = initials.charCodeAt(i) + ((h << 5) - h);

  return COLORS[Math.abs(h) % COLORS.length];
}

      { id: 'c9', title: 'Fix date picker styling', desc: 'Date picker overflows container on small viewports.', priority: 'low', assignee: 'TK', due: '2026-04-13', labels: ['Frontend', 'Bug'] }
    ]
  },
  {

      { id: 'c10', title: 'Project setup & scaffolding', desc: 'Initialize repo, configure linting, set up folder structure.', priority: 'low', assignee: 'MR', due: '2026-04-05', labels: ['Backend'] },
      { id: 'c11', title: 'Design system tokens', desc: 'Define colors, typography, spacing, and shadow tokens.', priority: 'medium', assignee: 'TK', due: '2026-04-08', labels: ['Frontend', 'Feature'] },
      { id: 'c12', title: 'Landing page layout', desc: 'Build responsive grid layout for the landing page.', priority: 'high', assignee: 'AS', due: '2026-04-10', labels: ['Frontend'] }
    ]
  }
];

var sampleComments = [
  { author: 'Aisha Syed', initials: 'AS', time: '2 hours ago', text: 'I\'ve started looking into this. The initial approach looks solid, but we might want to consider edge cases for older browsers.' },
  { author: 'Mike Ross', initials: 'MR', time: '45 minutes ago', text: 'Agreed. I can help with testing once the implementation is ready. Let me know if you need any backend changes.' }
];

var currentCard = null;
var cardIdCounter = 100;
var draggedId = null;
var activeFilter = 'All';

function updateStats() {
  var total = 0;
  var counts = {};
  boardData.forEach(function(col) {
    counts[col.id] = col.cards.length;
    total += col.cards.length;
  });
  var statsEl = document.getElementById('statsBar');
  statsEl.innerHTML =
    '<span class="stat-item"><span class="stat-count">' + total + '</span> Tasks</span>' +
    '<span class="stat-divider">|</span>' +
    '<span class="stat-item"><span class="stat-count">' + (counts.todo || 0) + '</span> To Do</span>' +
    '<span class="stat-divider">|</span>' +
    '<span class="stat-item"><span class="stat-count">' + (counts.progress || 0) + '</span> In Progress</span>' +
    '<span class="stat-divider">|</span>' +
    '<span class="stat-item"><span class="stat-count">' + (counts.review || 0) + '</span> In Review</span>' +
    '<span class="stat-divider">|</span>' +
    '<span class="stat-item"><span class="stat-count">' + (counts.done || 0) + '</span> Done</span>';
}

function setFilter(filter, btn) {
  activeFilter = filter;
  var btns = document.querySelectorAll('.filter-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
  }
  btn.classList.add('active');
  renderBoard();
}

function getFilteredCards(cards) {
  if (activeFilter === 'All') return cards;
  return cards.filter(function(c) {
    return c.labels.indexOf(activeFilter) > -1;
  });
}

function renderBoard() {
  var board = document.getElementById('board');
  board.innerHTML = '';
  boardData.forEach(function(col) {
    var filteredCards = getFilteredCards(col.cards);
    var colEl = document.createElement('div');
    colEl.className = 'column';
    var dotColor = COLUMN_COLORS[col.id] || '#6366f1';
    colEl.innerHTML =
      '<div class="column-header">' +
        '<div class="column-title-group">' +
          '<span class="column-dot" style="background:' + dotColor + '"></span>' +
          '<span class="column-title">' + col.title + '</span>' +
          '<span class="card-count">' + col.cards.length + '</span>' +
        '</div>' +
        '<button class="column-menu-btn"><i class="fa-solid fa-ellipsis"></i></button>' +
      '</div>' +
      '<div class="column-body" id="col-' + col.id + '" ' +
        'ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event,\'' + col.id + '\')">' +
        filteredCards.map(function(c) { return renderCard(c, col.id); }).join('') +
      '</div>' +
      '<button class="add-card-btn" onclick="showAddForm(\'' + col.id + '\')">' +
        '<i class="fa-solid fa-plus"></i> Add a card' +
      '</button>' +
      '<div class="add-form" id="form-' + col.id + '">' +
        '<input type="text" placeholder="Enter card title..." id="input-' + col.id + '" onkeydown="if(event.key===\'Enter\')submitCard(\'' + col.id + '\')">' +
        '<div class="add-form-actions">' +
          '<button class="btn-add" onclick="submitCard(\'' + col.id + '\')">Add Card</button>' +
          '<button class="btn-cancel" onclick="hideAddForm(\'' + col.id + '\')">Cancel</button>' +
        '</div>' +
      '</div>';
    board.appendChild(colEl);
  });
  updateStats();
}

function renderCard(c, colId) {
  var labelHtml = c.labels.map(function(l) {
    return '<span class="label label-' + l.toLowerCase() + '">' + l + '</span>';
  }).join('');

  var moveOptions = boardData.map(function(col) {
    return '<option value="' + col.id + '">' + col.title + '</option>';
  }).join('');

  var isDone = colId === 'done';
  var cardClass = 'card' + (isDone ? ' done-card' : '');

  return '<div class="' + cardClass + '" draggable="true" data-id="' + c.id + '" ' +
    'ondragstart="handleDragStart(event)" ondragend="handleDragEnd(event)" onclick="openModal(\'' + c.id + '\')">' +
    '<div class="card-labels">' + labelHtml + '</div>' +
    '<div class="card-title">' + c.title + '</div>' +
    '<div class="card-desc">' + c.desc + '</div>' +
    '<div class="card-meta">' +
      '<div class="card-meta-left">' +
        '<span class="priority priority-' + c.priority + '">' + c.priority + '</span>' +
        '<span class="due-date"><i class="fa-regular fa-calendar"></i> ' + formatDate(c.due) + '</span>' +
      '</div>' +
      '<div class="assignee" style="background:' + avatarColor(c.assignee) + '">' + c.assignee + '</div>' +
    '</div>' +
    '<select class="move-select" onclick="event.stopPropagation()" onchange="moveCard(\'' + c.id + '\',this.value);this.selectedIndex=0">' +
      '<option value="">Move to...</option>' +
      moveOptions +
    '</select>' +
  '</div>';
}

function formatDate(d) {
  var dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function moveCard(cardId, targetColId) {
  if (!targetColId) return;
  var card = null;
  boardData.forEach(function(col) {
    var ci = col.cards.findIndex(function(c) { return c.id === cardId; });
    if (ci > -1) {
      card = col.cards.splice(ci, 1)[0];
    }
  });
  if (card) {
    var target = boardData.find(function(col) { return col.id === targetColId; });
    if (target) target.cards.push(card);
    renderBoard();
  }
}

/* Drag & Drop */
function handleDragStart(e) {
  draggedId = e.target.dataset.id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function handleDragEnd(e) {
  e.target.classList.remove('dragging');
  var bodies = document.querySelectorAll('.column-body');
  for (var i = 0; i < bodies.length; i++) {
    bodies[i].classList.remove('drag-over');
  }
  var phs = document.querySelectorAll('.drop-placeholder');
  for (var j = 0; j < phs.length; j++) {
    phs[j].remove();
  }
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var body = e.currentTarget;
  body.classList.add('drag-over');
  if (!body.querySelector('.drop-placeholder')) {
    var ph = document.createElement('div');
    ph.className = 'drop-placeholder';
    body.appendChild(ph);
  }
}

function handleDragLeave(e) {
  var body = e.currentTarget;
  if (!body.contains(e.relatedTarget)) {
    body.classList.remove('drag-over');
    var phs = body.querySelectorAll('.drop-placeholder');
    for (var i = 0; i < phs.length; i++) {
      phs[i].remove();
    }
  }
}

function handleDrop(e, colId) {
  e.preventDefault();
  if (!draggedId) return;
  var card = null;
  boardData.forEach(function(col) {
    var ci = col.cards.findIndex(function(c) { return c.id === draggedId; });
    if (ci > -1) {
      card = col.cards.splice(ci, 1)[0];
    }
  });
  if (card) {
    var destCol = boardData.find(function(c) { return c.id === colId; });
    if (destCol) destCol.cards.push(card);
    renderBoard();
  }
  draggedId = null;
}

/* Add Card */
function showAddForm(colId) {
  document.getElementById('form-' + colId).classList.add('open');
  document.getElementById('input-' + colId).focus();
}

function hideAddForm(colId) {
  document.getElementById('form-' + colId).classList.remove('open');
  document.getElementById('input-' + colId).value = '';
}

function submitCard(colId) {
  var input = document.getElementById('input-' + colId);
  var title = input.value.trim();
  if (!title) return;
  var col = boardData.find(function(c) { return c.id === colId; });
  cardIdCounter++;
  col.cards.push({
    id: 'c' + cardIdCounter,
    title: title,
    desc: 'No description yet.',
    priority: 'medium',
    assignee: 'TK',
    due: new Date().toISOString().slice(0, 10),
    labels: ['Feature']
  });
  hideAddForm(colId);
  renderBoard();
}

/* Modal */
function openModal(cardId) {
  var card = null;
  boardData.forEach(function(col) {
    col.cards.forEach(function(c) {
      if (c.id === cardId) card = c;
    });
  });
  if (!card) return;
  currentCard = card;
  document.getElementById('modalTitle').textContent = card.title;
  document.getElementById('modalDesc').value = card.desc;
  document.getElementById('modalPriority').value = card.priority;
  document.getElementById('modalAssignee').value = card.assignee;
  document.getElementById('modalDue').value = card.due;

  var labelBtns = document.querySelectorAll('.modal-label-btn');
  for (var i = 0; i < labelBtns.length; i++) {
    var btn = labelBtns[i];
    if (card.labels.indexOf(btn.dataset.label) > -1) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  }

  var commentsEl = document.getElementById('modalComments');
  commentsEl.innerHTML = sampleComments.map(function(c) {
    return '<div class="comment">' +
      '<div class="comment-avatar" style="background:' + avatarColor(c.initials) + '">' + c.initials + '</div>' +
      '<div class="comment-body">' +
        '<div class="comment-header">' +
          '<span class="comment-author">' + c.author + '</span>' +
          '<span class="comment-time">' + c.time + '</span>' +
        '</div>' +
        '<div class="comment-text">' + c.text + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  document.getElementById('commentInput').value = '';
  document.getElementById('modalOverlay').classList.add('open');

  document.getElementById('modalDesc').onchange = function() {
    card.desc = document.getElementById('modalDesc').value;
    renderBoard();
  };
  document.getElementById('modalPriority').onchange = function() {
    card.priority = document.getElementById('modalPriority').value;
    renderBoard();
  };
  document.getElementById('modalAssignee').onchange = function() {
    card.assignee = document.getElementById('modalAssignee').value;
    renderBoard();
  };
  document.getElementById('modalDue').onchange = function() {
    card.due = document.getElementById('modalDue').value;
    renderBoard();
  };
}

function handleOverlayClick(event) {
  if (event.target === document.getElementById('modalOverlay')) {
    closeModal();
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentCard = null;
}

function toggleModalLabel(el) {
  if (!currentCard) return;
  var label = el.dataset.label;
  var idx = currentCard.labels.indexOf(label);
  if (idx > -1) {
    currentCard.labels.splice(idx, 1);
  } else {
    currentCard.labels.push(label);
  }
  el.classList.toggle('active');
  renderBoard();
}

function addComment() {
  var input = document.getElementById('commentInput');
  var text = input.value.trim();
  if (!text) return;
  var commentsEl = document.getElementById('modalComments');
  var safeText = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  commentsEl.innerHTML +=
    '<div class="comment">' +
      '<div class="comment-avatar" style="background:' + avatarColor('TK') + '">TK</div>' +
      '<div class="comment-body">' +
        '<div class="comment-header">' +
          '<span class="comment-author">Talha Khan</span>' +
          '<span class="comment-time">Just now</span>' +
        '</div>' +
        '<div class="comment-text">' + safeText + '</div>' +
      '</div>' +
    '</div>';
  input.value = '';
}

/* Keyboard */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

/* Init */
renderBoard();
</script>
</body>
</html>
